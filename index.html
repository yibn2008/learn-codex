<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Codex Source Deep Dive</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Noto+Serif+SC:wght@400;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #faf9f7;
      --bg-surface: #f0efec;
      --bg-code: #f5f4f1;
      --border: #e5e3de;
      --border-strong: #d5d3cd;
      --text: #3b3a36;
      --text-strong: #1a1918;
      --text-dim: #6e6c66;
      --text-faint: #9e9b93;
      --accent: #8b6b2e;
      --accent-dim: rgba(139,107,46,0.07);
      --sidebar-w: 240px;
      --content-w: 860px;
      --font-body: 'Inter', 'Noto Serif SC', -apple-system, sans-serif;
      --font-heading: 'Noto Serif SC', 'Inter', serif;
      --font-mono: 'IBM Plex Mono', monospace;
    }

    html { font-size: 15px; scroll-behavior: smooth; }
    body {
      font-family: var(--font-body);
      background: var(--bg);
      color: var(--text);
      line-height: 1.8;
      display: flex;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Sidebar ── */
    .sidebar {
      width: var(--sidebar-w);
      min-width: var(--sidebar-w);
      position: fixed;
      top: 0; left: 0; bottom: 0;
      z-index: 10;
      overflow-y: auto;
      padding: 32px 0;
      display: flex;
      flex-direction: column;
      background: var(--bg);
    }
    .sidebar-title {
      padding: 0 24px;
      margin-bottom: 40px;
    }
    .sidebar-title h1 {
      font-family: var(--font-heading);
      font-size: 0.95rem;
      font-weight: 700;
      color: var(--text-strong);
      line-height: 1.5;
    }
    .sidebar-title small {
      display: block;
      font-family: var(--font-body);
      font-size: 0.7rem;
      color: var(--text-faint);
      margin-top: 6px;
      font-weight: 400;
      letter-spacing: 0.04em;
    }
    .lang-toggle {
      margin-top: 14px;
      display: inline-flex;
      border: 1px solid var(--border-strong);
      border-radius: 4px;
      overflow: hidden;
      font-size: 0.7rem;
      letter-spacing: 0.04em;
      user-select: none;
    }
    .lang-toggle button {
      background: transparent;
      border: none;
      padding: 4px 10px;
      cursor: pointer;
      color: var(--text-dim);
      font-family: var(--font-body);
      font-size: inherit;
      transition: background 0.15s, color 0.15s;
    }
    .lang-toggle button + button { border-left: 1px solid var(--border); }
    .lang-toggle button:hover { color: var(--text-strong); }
    .lang-toggle button.active {
      background: var(--accent);
      color: #fff;
    }
    .lang-fallback-notice {
      margin-bottom: 24px;
      padding: 10px 14px;
      background: var(--accent-dim);
      border-left: 2px solid var(--accent);
      border-radius: 0 4px 4px 0;
      font-size: 0.78rem;
      color: var(--text-dim);
    }
    .lang-fallback-notice strong { color: var(--accent); font-weight: 600; }
    .nav-group { margin-bottom: 4px; }
    .nav-label {
      font-size: 0.65rem;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-faint);
      padding: 18px 24px 6px;
    }
    .nav-item {
      display: block;
      padding: 5px 24px;
      color: var(--text-dim);
      text-decoration: none;
      font-size: 0.82rem;
      cursor: pointer;
      transition: color 0.15s;
      line-height: 1.5;
    }
    .nav-item:hover { color: var(--text-strong); }
    .nav-item.active {
      color: var(--text-strong);
      font-weight: 500;
      position: relative;
    }
    .nav-item.active::before {
      content: '';
      position: absolute;
      left: 0;
      top: 4px; bottom: 4px;
      width: 2px;
      background: var(--accent);
    }
    .nav-item.sub {
      padding-left: 40px;
      font-size: 0.78rem;
      color: var(--text-faint);
    }
    .nav-item.sub:hover { color: var(--text-dim); }
    .nav-item.sub.active { color: var(--text-strong); }
    .nav-item.sub.active::before { left: 16px; }

    /* ── Main ── */
    .main {
      margin-left: var(--sidebar-w);
      flex: 1;
      min-height: 100vh;
      border-left: 1px solid var(--border);
      display: flex;
      justify-content: center;
    }
    .content-area {
      max-width: var(--content-w);
      width: 100%;
      padding: 64px 48px 120px;
      flex-shrink: 1;
    }

    /* ── Table of Contents ── */
    .toc {
      position: sticky;
      top: 32px;
      align-self: flex-start;
      width: 200px;
      min-width: 200px;
      max-height: calc(100vh - 64px);
      overflow-y: auto;
      padding: 12px 0;
      border-left: 1px solid var(--border);
      margin-top: 64px;
    }
    .toc-title {
      font-size: 0.65rem;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-faint);
      padding: 0 14px 8px;
    }
    .toc a {
      display: block;
      padding: 3px 14px;
      font-size: 0.75rem;
      color: var(--text-faint);
      text-decoration: none;
      line-height: 1.5;
      transition: color 0.15s;
      cursor: pointer;
    }
    .toc a:hover { color: var(--text-strong); }
    .toc a.active { color: var(--accent); }
    .toc a.toc-h3 { padding-left: 26px; }
    @media (max-width: 1100px) { .toc { display: none; } }

    /* ── Markdown ── */
    .content h1 {
      font-family: var(--font-heading);
      font-size: 1.7rem;
      font-weight: 700;
      color: var(--text-strong);
      letter-spacing: -0.01em;
      line-height: 1.4;
      margin-bottom: 12px;
    }
    .content h1 + blockquote {
      margin-top: 0;
      border: none;
      padding: 0;
      background: none;
    }
    .content h1 + blockquote p {
      font-size: 0.9rem;
      color: var(--text-dim);
      margin-bottom: 48px;
      font-style: italic;
    }
    .content h2 {
      font-family: var(--font-heading);
      font-size: 1.25rem;
      font-weight: 600;
      color: var(--text-strong);
      margin-top: 64px;
      margin-bottom: 20px;
      line-height: 1.4;
    }
    .content h3 {
      font-size: 1rem;
      font-weight: 600;
      color: var(--text-strong);
      margin-top: 40px;
      margin-bottom: 12px;
    }
    .content h4 {
      font-size: 0.88rem;
      font-weight: 600;
      color: var(--text);
      margin-top: 28px;
      margin-bottom: 8px;
    }
    .content p { margin-bottom: 18px; }

    .content > blockquote {
      border-left: 2px solid var(--accent);
      padding: 14px 20px;
      margin: 24px 0;
      background: var(--accent-dim);
      border-radius: 0 4px 4px 0;
    }
    .content blockquote p {
      margin-bottom: 6px;
      font-size: 0.9rem;
    }
    .content blockquote p:last-child { margin-bottom: 0; }
    .content blockquote strong { color: var(--accent); font-weight: 600; }

    .content ul, .content ol { margin: 0 0 18px 18px; }
    .content li { margin-bottom: 6px; }
    .content li > ul, .content li > ol { margin-top: 6px; margin-bottom: 0; }

    .content a {
      color: var(--accent);
      text-decoration: none;
      transition: opacity 0.15s;
    }
    .content a:hover { text-decoration: underline; }

    .content code {
      font-family: var(--font-mono);
      font-size: 0.82em;
      background: var(--bg-code);
      border: 1px solid var(--border);
      padding: 1px 5px;
      border-radius: 3px;
      color: var(--text-strong);
    }
    .content pre {
      margin: 20px 0;
      border-radius: 6px;
      overflow-x: auto;
      background: #2a2926;
    }
    .content pre code {
      display: block;
      padding: 18px 20px;
      background: none;
      border: none;
      color: #e0ded8;
      font-size: 0.8rem;
      line-height: 1.7;
      border-radius: 0;
      white-space: pre-wrap;
      word-break: break-all;
    }

    .content table {
      width: 100%;
      border-collapse: collapse;
      margin: 20px 0;
      font-size: 0.85rem;
    }
    .content thead th {
      text-align: left;
      padding: 10px 16px;
      border-bottom: 2px solid var(--border-strong);
      font-weight: 600;
      color: var(--text-strong);
      font-size: 0.78rem;
      letter-spacing: 0.02em;
    }
    .content tbody td {
      padding: 10px 16px;
      border-bottom: 1px solid var(--border);
      vertical-align: top;
    }
    .content tbody tr:hover { background: var(--accent-dim); }

    .content hr {
      border: none;
      border-top: 1px solid var(--border);
      margin: 48px 0;
    }
    .content strong { color: var(--text-strong); font-weight: 600; }
    .content img { max-width: 100%; border-radius: 4px; margin: 8px 0; }

    /* ── Mermaid ── */
    .content .mermaid-wrap {
      margin: 28px 0;
      padding: 24px;
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 6px;
      text-align: center;
      overflow-x: auto;
      position: relative;
      cursor: zoom-in;
    }
    .mermaid-wrap .zoom-hint {
      position: absolute;
      top: 8px; right: 10px;
      font-size: 0.68rem;
      color: var(--text-faint);
      pointer-events: none;
    }

    /* ── Lightbox for diagrams ── */
    .lightbox {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 100;
      background: rgba(0,0,0,0.5);
      backdrop-filter: blur(6px);
      cursor: zoom-out;
      overflow: auto;
      padding: 32px;
    }
    .lightbox.open { display: flex; align-items: flex-start; justify-content: center; }
    .lightbox-inner {
      background: #fff;
      border-radius: 8px;
      padding: 40px;
      margin: auto;
      overflow: auto;
      cursor: default;
      box-shadow: 0 20px 60px rgba(0,0,0,0.25);
    }
    .lightbox-inner svg {
      display: block;
    }

    /* ── Loading / empty ── */
    .loading {
      color: var(--text-faint);
      padding: 120px 0;
      text-align: center;
      font-size: 0.85rem;
    }
    .empty-state {
      text-align: center;
      padding: 120px 20px;
      color: var(--text-faint);
    }
    .empty-state h3 {
      font-family: var(--font-heading);
      font-size: 1.1rem;
      margin-bottom: 8px;
      color: var(--text-dim);
    }
    .empty-state p { font-size: 0.85rem; }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 3px; }

    /* ── Mobile ── */
    .mobile-toggle { display: none; }
    @media (max-width: 768px) {
      .sidebar {
        transform: translateX(-100%);
        transition: transform 0.25s ease;
        border-right: 1px solid var(--border);
      }
      .sidebar.open { transform: translateX(0); }
      .main { margin-left: 0; border-left: none; }
      .content-area { padding: 32px 20px 80px; }
      .mobile-toggle {
        display: block;
        position: fixed;
        top: 16px; left: 16px;
        z-index: 20;
        background: var(--bg);
        border: 1px solid var(--border-strong);
        border-radius: 4px;
        padding: 8px;
        cursor: pointer;
        color: var(--text-dim);
        line-height: 0;
      }
    }
  </style>
</head>
<body>
  <button class="mobile-toggle" onclick="toggleSidebar()">
    <svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M2 4.5h14M2 9h14M2 13.5h14"/></svg>
  </button>

  <aside class="sidebar" id="sidebar">
    <div class="sidebar-title">
      <h1 id="sidebarTitle"></h1>
      <small>OpenAI Codex CLI</small>
      <div class="lang-toggle" role="group" aria-label="Language">
        <button type="button" data-lang="en" onclick="setLang('en')">EN</button>
        <button type="button" data-lang="zh" onclick="setLang('zh')">中文</button>
      </div>
    </div>
    <nav id="nav"></nav>
  </aside>

  <main class="main">
    <div class="content-area">
      <article class="content" id="content">
        <div class="loading">Loading...</div>
      </article>
    </div>
    <nav class="toc" id="toc"></nav>
  </main>

  <!-- Lightbox for zooming diagrams -->
  <div class="lightbox" id="lightbox" onclick="closeLightbox(event)">
    <div class="lightbox-inner" id="lightboxContent"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mermaid/dist/mermaid.min.js"></script>
  <script>
    // Each page has language variants. `base` is the unsuffixed path; the EN file is `<base>.md`,
    // the ZH file is `<base>.zh.md`. Files without a translation (e.g. raw JSON) use `file` instead.
    const pages = [
      { id: 'project',  file: 'PROJECT.md',  titles: { en: 'Project goals (中文)', zh: '项目目标' }, hidden: true },
      { id: 'progress', file: 'PROGRESS.md', titles: { en: 'Progress (中文)', zh: '任务进度' }, hidden: true },
      { id: 'readme', base: 'wiki/README', titles: { en: 'Home', zh: '首页' }, section: 'home' },
      { id: '00', base: 'wiki/00-project-overview',     section: 'foundations' },
      { id: '01', base: 'wiki/01-architecture-overview', section: 'foundations' },
      { id: '02', base: 'wiki/02-prompt-and-tools',      section: 'foundations' },
      { id: '02-full', base: 'wiki/02-appendix/02-full-request-annotated', titles: { en: 'Full request, annotated', zh: '完整请求逐段注解' }, section: 'foundations', sub: true },
      { id: '02-json', file: 'wiki/02-appendix/02-full-request.json', titles: { en: 'Full request JSON', zh: '完整请求 JSON' }, section: 'foundations', sub: true },
      { id: '03', base: 'wiki/03-agent-loop',          section: 'core' },
      { id: '04', base: 'wiki/04-tool-system',          section: 'core' },
      { id: '05', base: 'wiki/05-context-management',   section: 'core' },
      { id: '06', base: 'wiki/06-sub-agent-system',     section: 'core' },
      { id: '07', base: 'wiki/07-approval-safety',      section: 'core' },
      { id: '08', base: 'wiki/08-api-model-interaction', section: 'core' },
      { id: '09', base: 'wiki/09-mcp-skills-plugins',   section: 'extensions' },
      { id: '10', base: 'wiki/10-sdk-protocol',         section: 'extensions' },
      { id: '11', base: 'wiki/11-config-system',        section: 'extensions' },
    ];

    // i18n strings for the chrome (sidebar / fallback notice)
    const i18n = {
      en: {
        siteTitle: 'Codex<br/>Source Deep Dive',
        sectionLabels: { home: '', foundations: 'Foundations', core: 'Core', extensions: 'Extensions' },
        loading: 'Loading…',
        notWritten: 'Not written yet',
        loadFailed: 'Failed to load',
        fallbackNotice: 'English version not available yet — showing the <strong>Chinese</strong> original. Use the toggle at the top-left to stay on Chinese, or check back later.',
      },
      zh: {
        siteTitle: 'Codex<br/>源码解析',
        sectionLabels: { home: '', foundations: '基础', core: '核心', extensions: '延展' },
        loading: '加载中…',
        notWritten: '尚未编写',
        loadFailed: '加载失败',
        fallbackNotice: '此页暂无中文版 — 显示<strong>英文</strong>原文。',
      },
    };

    let currentLang = (function () {
      try { return localStorage.getItem('lang') || 'en'; } catch { return 'en'; }
    })();

    function pageFile(p, lang) {
      if (p.file) return p.file;             // language-neutral (e.g. JSON)
      if (!p.base) return null;
      return lang === 'zh' ? `${p.base}.zh.md` : `${p.base}.md`;
    }

    // Best-effort 404 detection across local file:// and HTTP servers
    async function tryFetch(path) {
      try {
        const res = await fetch(path);
        if (!res.ok) return null;
        const text = await res.text();
        // file:// often returns 200 with empty body for missing files; treat zero-length as missing.
        if (!text.length) return null;
        return text;
      } catch { return null; }
    }

    // Pre-fetch titles from Markdown H1 headings; one pass per language
    async function loadPageTitles() {
      const fetches = pages.filter(p => !p.hidden).map(async (p) => {
        p.titles = p.titles || {};
        for (const lang of ['en', 'zh']) {
          if (p.titles[lang]) continue;
          const path = pageFile(p, lang);
          if (!path) continue;
          const text = await tryFetch(path);
          if (!text) continue;
          // Skip language-switcher banner on line 1 if present
          const lines = text.split(/\r?\n/);
          for (const line of lines) {
            const m = line.match(/^#\s+(.+)/);
            if (m) { p.titles[lang] = m[1].trim(); break; }
          }
        }
      });
      await Promise.all(fetches);
      buildNav();
    }

    function pageTitle(p, lang) {
      if (!p.titles) return p.id;
      return p.titles[lang] || p.titles.en || p.titles.zh || p.id;
    }

    mermaid.initialize({
      startOnLoad: false,
      theme: 'default',
      themeVariables: {
        primaryColor: '#e8e4dd',
        primaryTextColor: '#1a1918',
        primaryBorderColor: '#c5c1b8',
        lineColor: '#9e9b93',
        secondaryColor: '#f0efec',
        tertiaryColor: '#faf9f7',
        fontFamily: 'Inter, Noto Serif SC, sans-serif',
        fontSize: '14px',
      },
    });

    let currentPageFile = '';

    function resolveRepoPath(fromFile, target) {
      if (!target) return target;
      if (/^(?:[a-z]+:|\/\/|#)/i.test(target)) return target;
      const fromDir = fromFile.includes('/') ? fromFile.slice(0, fromFile.lastIndexOf('/') + 1) : '';
      const resolved = new URL(target, `https://repo.local/${fromDir}`);
      return `${resolved.pathname.replace(/^\//, '')}${resolved.search}${resolved.hash}`;
    }

    // Resolve a markdown link to a page id, accepting both EN and ZH filenames.
    function findPageByPath(path) {
      // Match by language-neutral base (strip .zh.md or .md)
      const baseFromPath = path.replace(/\.zh\.md$/, '').replace(/\.md$/, '');
      return pages.find(p => {
        if (p.file && p.file === path) return true;
        if (p.base && p.base === baseFromPath) return true;
        return false;
      });
    }

    const renderer = new marked.Renderer();
    renderer.code = function({ text, lang }) {
      if (lang === 'mermaid') {
        return `<div class="mermaid-wrap" onclick="openLightbox(this)"><span class="zoom-hint">click to zoom</span><div class="mermaid">${text}</div></div>`;
      }
      const esc = text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
      return `<pre><code class="language-${lang || ''}">${esc}</code></pre>`;
    };
    renderer.link = function({ href, title, text }) {
      if (href && !/^(?:[a-z]+:|\/\/|#)/i.test(href)) {
        const resolvedHref = resolveRepoPath(currentPageFile, href);
        const resolvedPath = resolvedHref.split('#')[0];
        const match = findPageByPath(resolvedPath);
        if (match) {
          return `<a href="#${match.id}" onclick="loadPage('${match.id}');return false;">${text}</a>`;
        }
        href = resolvedHref;
      }
      const ext = href && /^(?:https?:)?\/\//i.test(href) ? ' target="_blank" rel="noopener"' : '';
      const titleAttr = title ? ` title="${title}"` : '';
      return `<a href="${href}"${titleAttr}${ext}>${text}</a>`;
    };
    marked.setOptions({ renderer, gfm: true, breaks: false });

    function buildNav() {
      const t = i18n[currentLang];
      // Update site title and toggle highlight
      document.getElementById('sidebarTitle').innerHTML = t.siteTitle;
      document.querySelectorAll('.lang-toggle button').forEach(b =>
        b.classList.toggle('active', b.dataset.lang === currentLang)
      );

      const nav = document.getElementById('nav');
      let html = '';
      let sec = '';
      for (const p of pages) {
        if (p.hidden) continue;
        if (p.section && p.section !== sec) {
          if (sec) html += '</div>';
          sec = p.section;
          const label = t.sectionLabels[sec] || '';
          html += `<div class="nav-group">${label ? `<div class="nav-label">${label}</div>` : ''}`;
        }
        const subClass = p.sub ? ' sub' : '';
        html += `<a class="nav-item${subClass}" data-id="${p.id}" onclick="loadPage('${p.id}')">${pageTitle(p, currentLang)}</a>`;
      }
      if (sec) html += '</div>';
      nav.innerHTML = html;

      // Re-highlight active nav item if a page is loaded
      const activeId = location.hash.replace('#', '');
      if (activeId) {
        document.querySelectorAll('.nav-item').forEach(el =>
          el.classList.toggle('active', el.dataset.id === activeId)
        );
      }
    }

    async function loadPage(id) {
      const page = pages.find(p => p.id === id);
      if (!page) return;
      history.replaceState(null, '', `#${id}`);
      document.querySelectorAll('.nav-item').forEach(el =>
        el.classList.toggle('active', el.dataset.id === id)
      );
      const content = document.getElementById('content');
      const t = i18n[currentLang];
      content.innerHTML = `<div class="loading">${t.loading}</div>`;

      // Try preferred lang, fall back to the other lang
      let path = pageFile(page, currentLang);
      let text = path ? await tryFetch(path) : null;
      let usedLang = currentLang;
      if (!text && !page.file) {
        const otherLang = currentLang === 'en' ? 'zh' : 'en';
        const altPath = pageFile(page, otherLang);
        const altText = await tryFetch(altPath);
        if (altText) {
          text = altText;
          path = altPath;
          usedLang = otherLang;
        }
      }
      if (!text) {
        const title = pageTitle(page, currentLang);
        content.innerHTML = `<div class="empty-state"><h3>${title}</h3><p>${t.notWritten}</p></div>`;
        document.getElementById('toc').innerHTML = '';
        return;
      }

      currentPageFile = path;
      try {
        if (path.endsWith('.json')) {
          const pretty = JSON.stringify(JSON.parse(text), null, 2);
          const title = pageTitle(page, currentLang);
          content.innerHTML = `<h1>${title}</h1><pre><code class="language-json">${pretty.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}</code></pre>`;
        } else {
          let html = '';
          if (usedLang !== currentLang) {
            html += `<div class="lang-fallback-notice">${t.fallbackNotice}</div>`;
          }
          html += marked.parse(text);
          content.innerHTML = html;
          await mermaid.run({ nodes: content.querySelectorAll('.mermaid') });
        }
        window.scrollTo(0, 0);
        buildToc();
      } catch (e) {
        content.innerHTML = `<div class="empty-state"><h3>${t.loadFailed}</h3><p>${e.message}</p></div>`;
        document.getElementById('toc').innerHTML = '';
      }
      document.getElementById('sidebar').classList.remove('open');
    }

    function setLang(lang) {
      if (lang !== 'en' && lang !== 'zh') return;
      if (lang === currentLang) return;
      currentLang = lang;
      try { localStorage.setItem('lang', lang); } catch {}
      document.documentElement.lang = lang === 'zh' ? 'zh-CN' : 'en';
      buildNav();
      const id = location.hash.replace('#', '') || 'readme';
      loadPage(id);
    }

    function buildToc() {
      const content = document.getElementById('content');
      const toc = document.getElementById('toc');
      const headings = content.querySelectorAll('h2, h3');
      if (headings.length < 2) { toc.innerHTML = ''; return; }
      let html = '<div class="toc-title">目录</div>';
      headings.forEach((h, i) => {
        const id = 'heading-' + i;
        h.id = id;
        const level = h.tagName === 'H3' ? ' toc-h3' : '';
        html += `<a class="${level}" data-target="${id}" onclick="document.getElementById('${id}').scrollIntoView({behavior:'smooth',block:'start'})">${h.textContent}</a>`;
      });
      toc.innerHTML = html;

      // Scroll spy
      const observer = new IntersectionObserver((entries) => {
        entries.forEach(e => {
          if (e.isIntersecting) {
            toc.querySelectorAll('a').forEach(a => a.classList.remove('active'));
            const link = toc.querySelector(`a[data-target="${e.target.id}"]`);
            if (link) link.classList.add('active');
          }
        });
      }, { rootMargin: '-80px 0px -70% 0px' });
      headings.forEach(h => observer.observe(h));
    }

    function openLightbox(wrapEl) {
      const svg = wrapEl.querySelector('svg');
      if (!svg) return;
      const lb = document.getElementById('lightbox');
      const inner = document.getElementById('lightboxContent');
      const clone = svg.cloneNode(true);
      // Remove fixed dimensions so SVG fills container
      const vb = clone.getAttribute('viewBox');
      if (vb) {
        const [,, vw, vh] = vb.split(/[\s,]+/).map(Number);
        // Scale to fit viewport with comfortable padding
        const maxW = window.innerWidth - 120;
        const maxH = window.innerHeight - 120;
        const scale = Math.min(maxW / vw, maxH / vh, 3);
        clone.setAttribute('width', Math.round(vw * scale));
        clone.setAttribute('height', Math.round(vh * scale));
      }
      inner.innerHTML = '';
      inner.appendChild(clone);
      lb.classList.add('open');
      document.body.style.overflow = 'hidden';
    }
    function closeLightbox(e) {
      if (e.target === e.currentTarget || e.target.closest('.lightbox-inner') === null) {
        document.getElementById('lightbox').classList.remove('open');
        document.body.style.overflow = '';
      }
    }
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') {
        document.getElementById('lightbox').classList.remove('open');
        document.body.style.overflow = '';
      }
    });

    function toggleSidebar() {
      document.getElementById('sidebar').classList.toggle('open');
    }

    // Build nav with fallback titles first, then load real titles from files
    document.documentElement.lang = currentLang === 'zh' ? 'zh-CN' : 'en';
    buildNav();
    loadPageTitles().then(() => {
      loadPage(location.hash.replace('#','') || 'readme');
    });
  </script>
</body>
</html>
